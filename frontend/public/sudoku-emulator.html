<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku Game - DOS Emulator</title>
    <!-- js-dos v8 CDN -->
    <link rel="stylesheet" href="https://v8.js-dos.com/latest/js-dos.css">
    <script src="https://v8.js-dos.com/latest/js-dos.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: #000;
            font-family: 'Courier New', monospace;
            width: 100vw;
            height: 100vh;
            overflow: hidden !important;
        }
        #container {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            justify-content: stretch;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: transparent;
        }
        #dos {
            width: 100%;
            height: 100%;
            background: transparent;
            border-radius: 0;
            box-shadow: none;
            margin: 0;
            display: block;
        }
    </style>
</head>
<body>
    <div id="container">
        <h1 style="color:#ffd700;">Sudoku Game (x86 Assembly)</h1>
        <div id="dos"></div>
    </div>
    <script>
        Dos(document.getElementById("dos"), {
            url: "/bundle.jsdos"
        }).then(dos => dos.start());
    </script>
</body>
</html>
